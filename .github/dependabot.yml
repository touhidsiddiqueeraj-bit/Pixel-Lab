# Keep dependencies up to date.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm / bun dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - needs-triage
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      # Group minor + patch updates so we don't get one PR per dep
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope
